name: 💬 Auto Comment on Forked PR Opened

on:
    pull_request_target:
        types: [opened, reopened]

permissions:
    pull-requests: write
    contents: read

jobs:
    comment-on-forked-pr:
        runs-on: ubuntu-latest
        steps:
            - name: 🔍 Check if PR is from a fork
              id: check
              run: |
                  if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
                    echo "is_fork=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "is_fork=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: 💬 Post welcome comment on forked PR
              if: steps.check.outputs.is_fork == 'true'
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const prNumber = context.payload.pull_request.number;
                      const prTitle = context.payload.pull_request.title;
                      const prAuthor = context.payload.pull_request.user.login;

                      const comment = `👋 Namaste @${prAuthor}! 

                      Thank you for opening this Pull Request: **"${prTitle}"** 🛠️.
                      Your contribution is a huge step towards making SahiDawa a reliable medicine verifier for India! 🇮🇳
                      
                      ### 📌 What's Next?
                      - **GSSoC 2026:** Ensure you have linked the correct issue in your PR description.
                      - **Review:** Our maintainers will review your code as soon as possible.
                      - **Checks:** Please make sure your code follows the Developer Guide and no build errors are present.
                      
                      If you need help, feel free to ask here or join our [Discord Community](https://discord.gg/dvbDuJVwNa). Happy coding! 🚀`;

                      await github.rest.issues.createComment({
                        issue_number: prNumber,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: comment
                      });
